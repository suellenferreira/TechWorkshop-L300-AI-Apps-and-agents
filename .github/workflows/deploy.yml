name: Build and Deploy to Azure Container App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.CONTAINER_APP_NAME }}:${{ github.sha }}
          docker build -t "$IMAGE_TAG" ./src
          docker push "$IMAGE_TAG"

      - name: Deploy to Azure Container App
        run: |
          IMAGE_TAG=${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.CONTAINER_APP_NAME }}:${{ github.sha }}
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image "$IMAGE_TAG" \
            --set-env-vars \
              "FOUNDRY_ENDPOINT=${{ secrets.FOUNDRY_ENDPOINT }}" \
              "gpt_endpoint=${{ secrets.gpt_endpoint }}" \
              "embedding_endpoint=${{ secrets.embedding_endpoint }}" \
              "phi_4_endpoint=${{ secrets.phi_4_endpoint }}"
